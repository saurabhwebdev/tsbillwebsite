            "@type": "Answer",

          "@type": "Question",
          "name": "Does SwiftBill work offline?",

            "@type": "Answer",
            "text": "Yes, SwiftBill has a PWA mode that lets you create bills even without internet. Transactions automatically sync when your connection comes back."
          }
        },
        {
          "@type": "Question",
          "name": "Is SwiftBill GST compliant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, SwiftBill generates GST-compliant invoices with CGST, SGST, and IGST calculations. It supports HSN codes, e-invoice format, and is updated for the latest GST rules."
          }
        },
        {
          "@type": "Question",
          "name": "Can multiple people use SwiftBill at the same time?",
          "acceptedAnswer": {
            "@type": "Answer",

          }
        }
      ]
    }
